<!DOCTYPE html>
<html>
<head>
    <title>EcoHome AR App</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: #000; }
        
        /* Modal for Guest Registration */
        #nameEntry {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 300; display: flex; justify-content: center; align-items: center;
        }

        #dataCard {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 400px; background: rgba(255, 255, 255, 0.98); 
            color: #1a1a1a; padding: 20px; border-radius: 20px; border-left: 8px solid #2ecc71; 
            z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.4); box-sizing: border-box; backdrop-filter: blur(10px);
        }

        /* Comparison Chart Styling */
        #chartContainer {
            margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; display: none;
        }
        .bar-row { display: flex; align-items: center; margin-bottom: 5px; }
        .bar-label { width: 60px; font-size: 10px; font-weight: bold; }
        .bar-bg { flex-grow: 1; background: #eee; height: 12px; border-radius: 6px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.5s ease-in-out; }

        .step-item { background: #f9f9f9; border-radius: 10px; padding: 10px; margin-bottom: 8px; border-left: 3px solid #2ecc71; font-size: 13px; }
        .btn-container { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 110; }
        .btn { padding: 15px; color: white; border: none; border-radius: 12px; font-weight: bold; flex: 1; margin: 0 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="nameEntry">
        <div style="background: white; padding: 30px; border-radius: 25px; width: 80%; max-width: 350px; text-align: center;">
            <h2 style="color: #2ecc71;">Setup Profile</h2>
            <p style="font-size: 14px; color: #666;">Enter your name to personalize your energy report.</p>
            <input type="text" id="userInput" placeholder="Your Name" style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px;">
            <button onclick="startApp()" style="margin-top:20px; width:100%; background:#2ecc71; color:white; padding:15px; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">CONTINUE</button>
        </div>
    </div>

    <div id="dataCard">
        <h2 id="appName" style="margin:0; font-size: 18px;">Appliance Name</h2>
        <div style="margin: 10px 0;">
            <span id="appStats" style="font-size: 22px; font-weight: 800;">AED 0.00/hr</span>
            <span id="appNudge" style="margin-left: 8px; font-size: 13px; color: #666;">(0W)</span>
        </div>
        
        <div class="step-container">
            <div id="personalizedTip" style="font-weight: bold; font-size: 13px; color: #333; margin-bottom: 12px; background: #e8f5e9; padding: 10px; border-radius: 8px;"></div>
            <div class="step-item" id="step1">Step 1...</div>
            <div class="step-item" id="step2" style="border-left-color: #3498db; background: #e3f2fd;">Step 2...</div>
        </div>

        <div id="chartContainer">
            <div style="font-size: 11px; font-weight: bold; margin-bottom: 5px;">HOUSEHOLD IMPACT:</div>
            <div class="bar-row">
                <div class="bar-label">AC</div>
                <div class="bar-bg"><div id="bar-ac" class="bar-fill" style="background: #ef5350;"></div></div>
            </div>
            <div class="bar-row">
                <div class="bar-label">Fridge</div>
                <div class="bar-bg"><div id="bar-fridge" class="bar-fill" style="background: #ffa726;"></div></div>
            </div>
            <div class="bar-row">
                <div class="bar-label">LED</div>
                <div class="bar-bg"><div id="bar-led" class="bar-fill" style="background: #66bb6a;"></div></div>
            </div>
        </div>
    </div>

    <div class="btn-container">
        <button onclick="scan('AC_01')" class="btn" style="background: #ef5350;">AC</button>
        <button onclick="scan('FRIDGE_01')" class="btn" style="background: #ffa726;">Fridge</button>
        <button onclick="scan('LED_01')" class="btn" style="background: #66bb6a;">LED</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-marker preset="hiro">
            <a-sphere id="cloud" position="0 0.5 0" radius="0.25" material="shader: flat; color: grey; opacity: 0.8"></a-sphere>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        let userName = "Guest";

        function startApp() {
            const input = document.getElementById('userInput').value;
            if(input) userName = input;
            document.getElementById('nameEntry').style.display = 'none';
        }

        async function scan(id) {
            try {
                const res = await fetch(window.location.origin + "/calculate", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id, userName: userName }) // Sending name to Flask
                });
                const data = await res.json();
                
                // Update AR Sphere
                document.querySelector('#cloud').setAttribute('material', 'color', data.color);
                
                // Update UI Card
                const card = document.getElementById('dataCard');
                card.style.display = 'block';
                card.style.borderLeftColor = data.color;
                
                document.getElementById('appName').innerText = data.name;
                document.getElementById('appName').style.color = data.color;
                document.getElementById('appStats').innerText = `AED ${data.cost}/hr`;
                document.getElementById('appNudge').innerText = `(${data.watts}W)`;
                document.getElementById('personalizedTip').innerText = data.tip;

                // Update Action Plan
                if(data.watts > 2000) {
                    document.getElementById('step1').innerText = "Set thermostat to 24°C.";
                    document.getElementById('step2').innerText = "Clean filters monthly.";
                    document.getElementById('bar-ac').style.width = data.chartHeight + "%";
                } else if (data.watts > 100) {
                    document.getElementById('step1').innerText = "Check door seals.";
                    document.getElementById('step2').innerText = "Keep 10cm wall gap.";
                    document.getElementById('bar-fridge').style.width = data.chartHeight + "%";
                } else {
                    document.getElementById('step1').innerText = "Turn off when leaving.";
                    document.getElementById('step2').innerText = "Use solar power banks.";
                    document.getElementById('bar-led').style.width = data.chartHeight + "%";
                }

                // Show the Chart
                document.getElementById('chartContainer').style.display = 'block';
                
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
