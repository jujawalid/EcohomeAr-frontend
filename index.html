<!DOCTYPE html>
<html>
<head>
    <title>EcoHome AR Study</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker preset="hiro">
            <a-sphere id="cloud" position="0 0.5 0" radius="0.5" material="color: grey; opacity: 0.8"></a-sphere>
            <a-entity id="infoText" position="0 1.2 0" text="value: Scanning...; color: black; align: center; width: 4;"></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
    <script>
        const BACKEND_URL = window.location.origin + "/calculate";
        async function scan(id) {
            try {
                const res = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id })
                });
                const data = await res.json();
                document.querySelector('#cloud').setAttribute('material', 'color', data.color);
                document.querySelector('#infoText').setAttribute('text', 'value', `${data.name}\n${data.watts}W\n${data.nudge}`);
            } catch (e) { console.error(e); }
        }
        document.querySelector('a-marker').addEventListener('markerFound', () => { scan("AC_01"); });
    </script>
</body>
</html>
