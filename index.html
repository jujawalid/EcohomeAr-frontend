<!DOCTYPE html>
<html>
<head>
    <title>EcoHome AR Study</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: #000; }
        
        /* Centered Data Card with Layered Design */
        #dataCard {
            display: none; 
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 92%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.98); 
            color: #1a1a1a; 
            padding: 20px;
            border-radius: 20px; 
            border-left: 8px solid #2ecc71; 
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        /* Styling for the new 3-Step Plan */
        .step-container { margin-top: 15px; }
        .step-item {
            background: #f9f9f9; 
            border-radius: 10px; 
            padding: 10px;
            margin-bottom: 8px; 
            border-left: 3px solid #2ecc71; 
            font-size: 13px;
            color: #333;
        }

        .btn-container { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 110; }
        .btn { padding: 15px; color: white; border: none; border-radius: 12px; font-weight: bold; flex: 1; margin: 0 5px; cursor: pointer; }

        #instructions {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); color: white; z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        
        #instructionBox {
            background: white; color: black; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px;
        }
    </style>
</head>
<body>

    <div id="instructions">
        <div id="instructionBox">
            <h2 style="margin-top:0; color: #2ecc71;">Welcome to EcoHome AR</h2>
            <p style="text-align: left; line-height: 1.6; font-size: 14px;">
                1. Ensure your room is well lit 💡<br>
                2. Point camera at the Hiro Marker 🎯<br>
                3. Keep a distance of 30cm to 50cm 📏<br>
                4. Tap a button below to scan energy data.
            </p>
            <button onclick="this.parentElement.parentElement.style.display='none'" 
                    style="margin-top:10px; width:100%; background:#2ecc71; border:none; color:white; padding:15px; border-radius:12px; font-weight:bold; cursor: pointer; font-size: 16px;">
                START EXPERIENCE
            </button>
        </div>
    </div>

    <div id="dataCard">
        <h2 id="appName" style="margin:0; font-size: 18px;">Appliance Name</h2>
        <div style="margin: 10px 0;">
            <span id="appStats" style="font-size: 22px; font-weight: 800;">AED 0.00/hr</span>
            <span id="appNudge" style="margin-left: 8px; font-size: 13px; color: #666;">(0W)</span>
        </div>
        
        <div class="step-container">
            <div style="font-weight: bold; font-size: 12px; color: #2ecc71; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px;">
                SUSTAINABILITY ACTION PLAN:
            </div>
            <div class="step-item" id="step1">Step 1...</div>
            <div class="step-item" id="step2" style="border-left-color: #3498db; background: #e3f2fd;">Step 2...</div>
            <div class="step-item" id="step3" style="border-left-color: #f1c40f; background: #fffde7;">Step 3...</div>
        </div>
    </div>

    <div class="btn-container">
        <button onclick="scan('AC_01')" class="btn" style="background: #ef5350;">AC</button>
        <button onclick="scan('FRIDGE_01')" class="btn" style="background: #ffa726;">Fridge</button>
        <button onclick="scan('LED_01')" class="btn" style="background: #66bb6a;">LED</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-marker preset="hiro">
            <a-sphere id="cloud" position="0 0.5 0" radius="0.25" material="shader: flat; color: grey; opacity: 0.8"></a-sphere>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        async function scan(id) {
            try {
                const res = await fetch(window.location.origin + "/calculate", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id })
                });
                const data = await res.json();
                
                document.querySelector('#cloud').setAttribute('material', 'color', data.color);
                
                const card = document.getElementById('dataCard');
                card.style.display = 'block';
                card.style.borderLeftColor = data.color;
                
                document.getElementById('appName').innerText = data.name;
                document.getElementById('appName').style.color = data.color;
                document.getElementById('appStats').innerText = `AED ${data.cost}/hr`;
                document.getElementById('appNudge').innerText = `(${data.watts}W)`;

                // 3-STEP NUDGE LOGIC
                if(data.watts > 2000) { // AC
                    document.getElementById('step1').innerText = "Action: Set thermostat to 24°C to reduce instant load.";
                    document.getElementById('step2').innerText = "Efficiency: Clean filters monthly to save 15% on DEWA.";
                    document.getElementById('step3').innerText = "Renewable: High load. Consider Solar-Hybrid cooling.";
                } else if (data.watts > 100) { // Fridge
                    document.getElementById('step1').innerText = "Action: Ensure door seals are tight to keep air cold.";
                    document.getElementById('step2').innerText = "Efficiency: Keep 10cm gap from walls for better airflow.";
                    document.getElementById('step3').innerText = "Renewable: Shift heavy cycles to peak solar hours (10am-4pm).";
                } else { // LED
                    document.getElementById('step1').innerText = "Action: Switch off when leaving to maintain efficiency.";
                    document.getElementById('step2').innerText = "Efficiency: Use 'Warm White' for optimal lumen output.";
                    document.getElementById('step3').innerText = "Renewable: 100% Solar Ready. Can run on portable battery.";
                }
                
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
