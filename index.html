<!DOCTYPE html>
<html>
<head>
    <title>EcoHome AR Study</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden; font-family: Arial, sans-serif;">

    <div style="position: fixed; bottom: 30px; width: 100%; text-align: center; z-index: 10; display: flex; justify-content: center; gap: 10px;">
        <button onclick="scan('AC_01')" style="padding: 12px 20px; background: #ff4d4d; color: white; border: none; border-radius: 25px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">Scan AC</button>
        <button onclick="scan('FRIDGE_01')" style="padding: 12px 20px; background: #ffa500; color: white; border: none; border-radius: 25px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">Scan Fridge</button>
        <button onclick="scan('LED_01')" style="padding: 12px 20px; background: #2ecc71; color: white; border: none; border-radius: 25px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">Scan LED</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker preset="hiro">
            <a-sphere id="cloud" position="0 0.5 0" radius="0.5" material="color: grey; opacity: 0.9; transparent: true"></a-sphere>
            
            <a-entity position="0 1.6 0">
                <a-plane width="3.2" height="1.4" material="color: black; opacity: 0.8"></a-plane>
                
                <a-text id="infoText" 
                        value="Select an item\nto view stats" 
                        align="center" 
                        color="white" 
                        width="5.5" 
                        position="0 0 0.1">
                </a-text>
            </a-entity>
        </a-marker>
        
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const BACKEND_URL = window.location.origin + "/calculate";

        async function scan(id) {
            const infoText = document.querySelector('#infoText');
            infoText.setAttribute('value', 'Loading Data...');
            
            try {
                const res = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id })
                });
                const data = await res.json();
                
                // 1. Update the 3D Sphere Color
                document.querySelector('#cloud').setAttribute('material', 'color', data.color);
                
                // 2. Update the Text Details
                // We use \n for line breaks to make it look like a list
                const statsStr = `${data.name}\n${data.watts} Watts\n${data.nudge}`;
                infoText.setAttribute('value', statsStr);
                
            } catch (e) { 
                console.error("Connection Error:", e);
                infoText.setAttribute('value', 'Error: Link Broken');
            }
        }
    </script>
</body>
</html>
