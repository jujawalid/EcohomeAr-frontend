<!DOCTYPE html>
<html>
<head>
    <title>EcoHome AR Study</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #000; }
        
        /* SHRUNK DATA CARD: Smaller and cleaner */
        #dataCard {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            width: 85%; max-width: 380px; background: rgba(255, 255, 255, 0.98); 
            color: #1a1a1a; padding: 15px; border-radius: 20px; 
            border-left: 8px solid #2ecc71; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            box-sizing: border-box; backdrop-filter: blur(10px);
        }

        /* TOGGLE BUTTON: Professional and simple */
        #toggleSteps {
            display: block; width: 100%; background: #f0f0f0; border: 1px solid #ddd;
            padding: 10px; border-radius: 10px; margin-top: 10px; font-weight: bold;
            font-size: 12px; cursor: pointer; color: #555;
        }

        .step-container { margin-top: 15px; display: none; } /* Hidden by default */
        .step-item {
            background: #f1f8e9; border-radius: 10px; padding: 10px;
            margin-bottom: 8px; border-left: 3px solid #8bc34a; font-size: 13px;
        }

        .btn-container { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 110; }
        .btn { padding: 16px; color: white; border: none; border-radius: 15px; font-weight: bold; flex: 1; margin: 0 5px; cursor: pointer; }

        #instructions {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); color: white; z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        #instructionBox { background: white; color: black; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="instructions">
        <div id="instructionBox">
            <h2 style="margin-top:0; color: #2ecc71;">Welcome to EcoHome AR</h2>
            <p style="text-align: left; line-height: 1.6; font-size: 14px;">
                1. Ensure your room is well lit.<br>
                2. Point camera at the Hiro Marker.<br>
                3. Keep a distance of 30cm to 50cm.<br>
                4. Tap a button below to scan.
            </p>
            <button onclick="this.parentElement.parentElement.style.display='none'" 
                    style="margin-top:10px; width:100%; background:#2ecc71; border:none; color:white; padding:15px; border-radius:12px; font-weight:bold; cursor: pointer;">
                START EXPERIENCE
            </button>
        </div>
    </div>

    <div id="dataCard">
        <h2 id="appName" style="margin:0; font-size: 16px;">Appliance Name</h2>
        <div style="margin: 10px 0;">
            <span id="appStats" style="font-size: 20px; font-weight: 800;">AED 0.00/hr</span>
            <span id="appNudge" style="margin-left: 8px; font-size: 12px; color: #666;">(0W)</span>
        </div>

        <button id="toggleSteps" onclick="toggleDetails()">▼ How to be sustainable?</button>
        
        <div id="stepContainer" class="step-container">
            <div style="font-weight: bold; font-size: 11px; color: #2ecc71; margin-bottom: 8px;">3-STEP ACTION PLAN:</div>
            <div class="step-item" id="step1"></div>
            <div class="step-item" id="step2" style="border-left-color: #3498db; background: #e3f2fd;"></div>
            <div class="step-item" id="step3" style="border-left-color: #f1c40f; background: #fffde7;"></div>
        </div>
    </div>

    <div class="btn-container">
        <button onclick="scan('AC_01')" class="btn" style="background: #ef5350;">AC</button>
        <button onclick="scan('FRIDGE_01')" class="btn" style="background: #ffa726;">FRIDGE</button>
        <button onclick="scan('LED_01')" class="btn" style="background: #66bb6a;">LED</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-marker preset="hiro">
            <a-sphere id="cloud" position="0 0.5 0" radius="0.25" material="shader: flat; color: grey; opacity: 0.8"></a-sphere>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Function to show/hide the action plan
        function toggleDetails() {
            const container = document.getElementById('stepContainer');
            const btn = document.getElementById('toggleSteps');
            if (container.style.display === "block") {
                container.style.display = "none";
                btn.innerText = "▼ How to be sustainable?";
            } else {
                container.style.display = "block";
                btn.innerText = "▲ Hide Sustainability Plan";
            }
        }

        async function scan(id) {
            try {
                const res = await fetch(window.location.origin + "/calculate", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id })
                });
                const data = await res.json();
                
                document.querySelector('#cloud').setAttribute('material', 'color', data.color);
                
                const card = document.getElementById('dataCard');
                card.style.display = 'block';
                card.style.borderLeftColor = data.color;
                
                // Reset the steps to closed when scanning a new item
                document.getElementById('stepContainer').style.display = "none";
                document.getElementById('toggleSteps').innerText = "▼ How to be sustainable?";
                
                document.getElementById('appName').innerText = data.name;
                document.getElementById('appStats').innerText = `AED ${data.cost}/hr`;
                document.getElementById('appNudge').innerText = `(${data.watts}W)`;

                if(data.watts > 2000) {
                    document.getElementById('step1').innerText = "Set AC to 24°C to reduce load.";
                    document.getElementById('step2').innerText = "Clean filters monthly to save 15% energy.";
                    document.getElementById('step3').innerText = "Consider a Solar-Hybrid cooling unit.";
                } else if (data.watts > 100) {
                    document.getElementById('step1').innerText = "Ensure door seals are tight.";
                    document.getElementById('step2').innerText = "Keep 10cm gap from walls for airflow.";
                    document.getElementById('step3').innerText = "Run cooling cycles during solar peak hours.";
                } else {
                    document.getElementById('step1').innerText = "Switch off when leaving the room.";
                    document.getElementById('step2').innerText = "Use LEDs for optimal lumen output.";
                    document.getElementById('step3').innerText = "100% Solar Ready. Minimal footprint.";
                }
                
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
