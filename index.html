<!DOCTYPE html>
<html>
<head>
    <title>EcoHome AR Study</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #000; }
        
        /* 1. DATA CARD: Professional Layered Design */
        #dataCard {
            display: none; position: fixed; top: 20px; left: 5%; width: 90%;
            background: rgba(255, 255, 255, 0.95); color: #1a1a1a; padding: 20px;
            border-radius: 20px; border-left: 8px solid #2ecc71; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: all 0.5s ease;
            backdrop-filter: blur(10px);
        }

        /* 2. SOLAR BADGE: High-end visual nudge */
        .solar-badge {
            float: right; background: #fff9c4; color: #fbc02d; padding: 4px 12px;
            border-radius: 15px; font-size: 11px; font-weight: 800; text-transform: uppercase;
            border: 1px solid #fbc02d;
        }

        /* 3. SUSTAINABILITY STEPS: Organized & Professional */
        .step-container { margin-top: 15px; display: none; }
        .step-item {
            background: #f1f8e9; border-radius: 10px; padding: 10px;
            margin-bottom: 8px; border-left: 3px solid #8bc34a; font-size: 13px;
        }

        .btn-container { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 12px; z-index: 110; }
        .btn { 
            padding: 16px; color: white; border: none; border-radius: 15px; 
            font-weight: bold; flex: 1; margin: 0 5px; cursor: pointer;
            transition: transform 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn:active { transform: scale(0.95); }

        #instructions {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); color: white; z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
    </style>
</head>
<body>

    <div id="instructions">
        <div style="background: white; color: black; padding: 30px; border-radius: 25px; width: 80%;">
            <h2 style="margin-top:0;">Welcome</h2>
            <p>1. Point camera at Hiro Marker<br>2. Select an appliance below</p>
            <button onclick="this.parentElement.parentElement.style.display='none'" 
                    style="background:#2ecc71; color:white; border:none; padding:15px; width:100%; border-radius:12px; font-weight:bold;">
                START SCANNING
            </button>
        </div>
    </div>

    <div id="dataCard">
        <div class="solar-badge" id="solarLabel">Solar Ready</div>
        <h2 id="appName" style="margin:0; font-size: 18px;">Appliance Name</h2>
        
        <div style="margin: 15px 0;">
            <span id="appStats" style="font-size: 24px; font-weight: 800;">0W</span>
            <span id="appNudge" style="margin-left: 10px; font-size: 14px; color: #666;">Status</span>
        </div>

        <div id="stepContainer" class="step-container">
            <div style="font-weight: bold; font-size: 12px; color: #2ecc71; margin-bottom: 8px;">RENEWABLE ACTION PLAN:</div>
            <div class="step-item" id="step1">Step 1 loading...</div>
            <div class="step-item" id="step2" style="border-left-color: #3498db; background: #e3f2fd;">Step 2 loading...</div>
        </div>
    </div>

    <div class="btn-container">
        <button onclick="scan('AC_01')" class="btn" style="background: #ef5350;">AC</button>
        <button onclick="scan('FRIDGE_01')" class="btn" style="background: #ffa726;">FRIDGE</button>
        <button onclick="scan('LED_01')" class="btn" style="background: #66bb6a;">LED</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-marker preset="hiro">
            <a-sphere id="cloud" position="0 0.5 0" radius="0.25" material="shader: flat; color: grey; opacity: 0.8"></a-sphere>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        async function scan(id) {
            try {
                const res = await fetch(window.location.origin + "/calculate", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id })
                });
                const data = await res.json();
                
                // Update AR Anchor
                document.querySelector('#cloud').setAttribute('material', 'color', data.color);
                
                // Update UI Card
                const card = document.getElementById('dataCard');
                card.style.display = 'block';
                card.style.borderLeftColor = data.color;
                
                document.getElementById('appName').innerText = data.name;
                document.getElementById('appStats').innerText = `AED ${data.cost}/hr`;
                document.getElementById('appNudge').innerText = `(${data.watts}W)`;
                
                // RENEWABLE LOGIC NUDGE
                document.getElementById('stepContainer').style.display = 'block';
                
                if(data.watts > 2000) {
                    document.getElementById('solarLabel').innerText = "High Solar Load";
                    document.getElementById('step1').innerText = "Set AC to 24°C to reduce load for future solar grid.";
                    document.getElementById('step2').innerText = "Consider a Solar-Thermal Hybrid AC unit.";
                } else if (data.watts > 100) {
                    document.getElementById('solarLabel').innerText = "Medium Solar Load";
                    document.getElementById('step1').innerText = "Move to daytime usage to match peak solar hours.";
                    document.getElementById('step2').innerText = "Ensure ventilation to maintain efficiency.";
                } else {
                    document.getElementById('solarLabel').innerText = "100% Solar Ready";
                    document.getElementById('step1').innerText = "Perfect for off-grid renewable energy use.";
                    document.getElementById('step2').innerText = "Minimal carbon footprint detected.";
                }
                
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
