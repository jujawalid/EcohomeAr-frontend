<!DOCTYPE html>
<html>
<head>
    <title>EcoHome AR Study</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background-color: #000; }
        
        /* Centered Data Card */
        #dataCard {
            display: none; 
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.85); 
            color: white; 
            padding: 20px;
            border-radius: 15px; 
            border-left: 5px solid #2ecc71; 
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .btn-container { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 110; }
        .btn { padding: 15px; color: white; border: none; border-radius: 12px; font-weight: bold; flex: 1; margin: 0 5px; cursor: pointer; }

        /* Simple Welcome Overlay */
        #instructions {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); color: white; z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        
        #instructionBox {
            background: white; color: black; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px;
        }
    </style>
</head>
<body>

    <div id="instructions">
        <div id="instructionBox">
            <h2 style="margin-top:0; color: #2ecc71;">Welcome to EcoHome AR</h2>
            <p style="text-align: left; line-height: 1.6;">
                1. Ensure your room is well lit.<br>
                2. Point your camera at the Hiro Marker.<br>
                3. Keep a distance of 30cm to 50cm.<br>
                4. Tap a button below to scan.
            </p>
            <button onclick="this.parentElement.parentElement.style.display='none'" 
                    style="margin-top:10px; width:100%; background:#2ecc71; border:none; color:white; padding:15px; border-radius:10px; font-weight:bold; cursor: pointer; font-size: 16px;">
                START
            </button>
        </div>
    </div>

    <div id="dataCard">
        <h2 id="appName" style="margin:0; color:#2ecc71;">Appliance Name</h2>
        <p id="appStats" style="font-size: 18px; margin: 10px 0;"></p>
        <p id="appNudge" style="font-weight: bold; margin: 0;"></p>
        <hr style="border: 0.5px solid #444; margin: 15px 0;">
        <p id="appTip" style="font-style: italic; color: #aaa; font-size: 14px;"></p>
    </div>

    <div class="btn-container">
        <button onclick="scan('AC_01')" class="btn" style="background: #ff4d4d;">AC</button>
        <button onclick="scan('FRIDGE_01')" class="btn" style="background: #ffa500;">Fridge</button>
        <button onclick="scan('LED_01')" class="btn" style="background: #2ecc71;">LED</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-marker preset="hiro">
            <a-sphere id="cloud" position="0 0.5 0" radius="0.25" material="shader: flat; color: grey; opacity: 0.8"></a-sphere>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        async function scan(id) {
            try {
                const res = await fetch(window.location.origin + "/calculate", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id })
                });
                const data = await res.json();
                
                // Update the small AR Sphere color
                document.querySelector('#cloud').setAttribute('material', 'color', data.color);
                
                // Update the Clean Data Card
                document.getElementById('dataCard').style.display = 'block';
                document.getElementById('dataCard').style.borderLeftColor = data.color;
                document.getElementById('appName').innerText = data.name;
                document.getElementById('appName').style.color = data.color;
                document.getElementById('appStats').innerText = `${data.watts}W | AED ${data.cost}/hr`;
                document.getElementById('appNudge').innerText = data.nudge;
                document.getElementById('appTip').innerText = data.tip;
                
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
