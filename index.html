<!DOCTYPE html>
<html>
<head>
    <title>EcoHome AR Study</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .btn { padding: 12px; color: white; border: none; border-radius: 25px; font-weight: bold; flex: 1; font-size: 11px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #instructions {
            position: fixed; top: 10px; width: 90%; left: 5%; background: rgba(0,0,0,0.95);
            color: white; padding: 15px; border-radius: 12px; z-index: 30; text-align: center; border: 2px solid #2ecc71; font-family: sans-serif;
        }
        #recommendationBox {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; background: white; color: black; padding: 25px; border-radius: 15px;
            z-index: 40; box-shadow: 0 0 25px rgba(0,0,0,0.6); text-align: center; font-family: sans-serif;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="instructions">
        <strong>Middlesex IT Project Guide</strong><br><br>
        1. Set Laptop Brightness to 100% 💡<br>
        2. Allow Camera Access 📸<br>
        3. <strong>POINT PHONE AT HIRO MARKER TO SCAN</strong> 🎯<br>
        4. Tap a button below to fetch data.
        <button onclick="this.parentElement.style.display='none'" style="margin-top:12px; width:100%; background:#2ecc71; color:white; border:none; padding:10px; border-radius:5px; font-weight:bold;">I'm Ready to Scan</button>
    </div>

    <div id="recommendationBox">
        <h3 id="recTitle" style="color:#2ecc71; margin-top:0;">Sustainability Method</h3>
        <p id="recText" style="font-size: 16px; line-height: 1.4;"></p>
        <button onclick="this.parentElement.style.display='none'" style="background:#333; color:white; border:none; padding:12px 25px; border-radius:8px; font-weight:bold;">Close Recommendation</button>
    </div>

    <div style="position: fixed; bottom: 30px; width: 96%; left: 2%; display: flex; gap: 8px; z-index: 10;">
        <button onclick="scan('AC_01')" class="btn" style="background: #ff4d4d;">Scan AC</button>
        <button onclick="scan('FRIDGE_01')" class="btn" style="background: #ffa500;">Scan Fridge</button>
        <button onclick="scan('LED_01')" class="btn" style="background: #2ecc71;">Scan LED</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker preset="hiro">
            <a-sphere id="cloud" position="0 0.5 0" radius="0.5" material="color: grey; opacity: 0.8"></a-sphere>
            
            <a-entity position="0 1.6 0">
                <a-plane width="3.2" height="1.4" material="color: black; opacity: 0.85"></a-plane>
                <a-text id="infoText" value="Scan Marker & \nChoose Appliance" align="center" color="white" width="5.5" position="0 0 0.1"></a-text>
            </a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        async function scan(id) {
            const infoText = document.querySelector('#infoText');
            infoText.setAttribute('value', 'Accessing Database...');
            
            try {
                const res = await fetch(window.location.origin + "/calculate", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id })
                });
                const data = await res.json();
                
                // Update the AR elements
                document.querySelector('#cloud').setAttribute('material', 'color', data.color);
                infoText.setAttribute('value', `${data.name}\n${data.watts}W | AED ${data.cost}/hr\n${data.nudge}`);
                
                // Show Recommendation Modal after a short delay
                setTimeout(() => {
                    document.getElementById('recText').innerText = data.tip;
                    document.getElementById('recommendationBox').style.display = 'block';
                }, 1200);
                
            } catch (e) { 
                infoText.setAttribute('value', 'Error: Connection Failure');
                console.error(e);
            }
        }
    </script>
</body>
</html>
